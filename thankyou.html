<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interview Complete</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;font-family:'Inter',sans-serif;background:#0f172a;
      display:flex;align-items:center;justify-content:center;
      background:radial-gradient(ellipse at 50% 40%,#1e3a5f,#0f172a 70%)}
    .card{background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:48px 40px;
      text-align:center;max-width:460px;width:90vw;box-shadow:0 8px 64px rgba(0,0,0,0.4)}
    .icon{width:72px;height:72px;margin:0 auto 20px;background:linear-gradient(135deg,#10b981,#059669);
      border-radius:50%;display:flex;align-items:center;justify-content:center;animation:pop .5s ease}
    .icon svg{width:36px;height:36px;color:#fff}
    h1{color:#f1f5f9;font-size:1.8rem;font-weight:700;margin-bottom:10px}
    p{color:#94a3b8;font-size:1.05rem;line-height:1.5;margin-bottom:24px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border:none;border-radius:14px;
      font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;transition:all .25s}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(99,102,241,0.4)}
    @keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg></div>
    <h1>Interview Complete</h1>
    <p>Thank you for attending the interview session. Your session has been recorded and will be reviewed.</p>
    <button class="btn" onclick="window.location.href='login.html'">Back to Login</button>
  </div>
</body>
</html>
